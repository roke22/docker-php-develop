networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres-data:
      external: true

services:
### NGINX Server #########################################
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${APP_CODE_FIRST_PROJECT}:/var/www/html
      - ${APP_CODE_SECOND_PROJECT}:/var/www/html2
      - ${APP_CODE_THIRD_PROJECT}:/var/www/html3
      - ./nginx/ssl/:/etc/nginx/ssl
      - ./nginx/sites/site.conf:/etc/nginx/conf.d/default.conf
    networks:
        - frontend
        - backend
    depends_on:
      - php

  ### PHP Server ###########################################
  # You can change the PHP version in .env with PHP_VERSION variable
  # Supports: 8.3, 8.2, 8.1, 8.0, 7.4, 7.3, 7.2, etc.
  php:
    build:
      context: ./php
      args:
        - PHP_VERSION=${PHP_VERSION:-8.0}
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
    ports:
      - "9000:9000"
    networks:
        - frontend
        - backend
    volumes:
      - ${APP_CODE_FIRST_PROJECT}:/var/www/html
      - ${APP_CODE_SECOND_PROJECT}:/var/www/html2
      - ${APP_CODE_THIRD_PROJECT}:/var/www/html3

### PostgreSQL ###########################################
  postgres:
    build: ./postgres
    volumes:
        - postgres-data:/var/lib/postgresql
        - ./postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
        - ./postgres/configuration:/etc/postgresql
    ports:
        - "5432:5432"
    environment:
        - POSTGRES_DB=db
        - POSTGRES_USER=user
        - POSTGRES_PASSWORD=password
    networks:
        - frontend
        - backend
    command: postgres -c config_file=/etc/postgresql/postgresql.conf

### Redis ################################################
  redis:
      build: ./redis
      volumes:
          - .data/redis:/data
      ports:
          - "6379:6379"
      networks:
          - backend
          - frontend
